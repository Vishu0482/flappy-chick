<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Chicken Pro</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Comic Sans MS', cursive;
    overflow: hidden;
  }
  canvas {
    border: 4px solid #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    background: #70C5CE;
    max-width: 100%;
    max-height: 100%;
  }
  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #score {
    position: absolute; top: 40px; font-size: 60px;
    color: #fff; text-shadow: 3px 3px 0 #000; font-weight: bold;
  }
 .screen {
    background: rgba(0,0,0,0.7);
    padding: 30px; border-radius: 20px; text-align: center; color: white;
    pointer-events: all;
  }
 .screen h1 { font-size: 48px; margin-bottom: 10px; color: #FFD700; }
 .screen p { font-size: 18px; margin: 10px 0; }
 .btn {
    background: #FFD700; color: #333; padding: 12px 30px;
    border: none; border-radius: 10px; font-size: 20px; font-weight: bold;
    margin-top: 15px; cursor: pointer; box-shadow: 0 4px 0 #DAA520;
  }
 .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #DAA520; }
  #highscore { color: #FFD700; }
 .hidden { display: none; }
</style>
</head>
<body>
<div id="score">0</div>
<canvas id="game" width="400" height="600"></canvas>

<div id="ui">
  <div id="startScreen" class="screen">
    <h1>🐔 FLAPPY CHICKEN 🐔</h1>
    <p>Tap / Click / Space to flap</p>
    <p>Dodge the pipes and get eggs!</p>
    <p id="highscore">High Score: 0</p>
    <button class="btn" onclick="startGame()">START</button>
  </div>
  <div id="gameOverScreen" class="screen hidden">
    <h1>GAME OVER</h1>
    <p>Score: <span id="finalScore">0</span></p>
    <p id="newHigh">New High Score!</p>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const finalScoreEl = document.getElementById('finalScore');
const highscoreEl = document.getElementById('highscore');
const newHighEl = document.getElementById('newHigh');

// Game variables
let chicken, pipes, frame, score, highScore, gameState, cloudOffset;
const GRAVITY = 0.35;
const FLAP = -7.5;
const PIPE_SPEED = 3;
const PIPE_GAP = 150;
const PIPE_SPACING = 90;

// Sound effects using WebAudio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if(type === 'flap') { osc.frequency.value = 600; gain.gain.value = 0.1; }
  if(type === 'score') { osc.frequency.value = 800; gain.gain.value = 0.1; }
  if(type === 'hit') { osc.frequency.value = 200; gain.gain.value = 0.2; }
  osc.start(); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.stop(audioCtx.currentTime + 0.2);
}

function init() {
  chicken = { x: 100, y: canvas.height/2, w: 40, h: 35, vy: 0, angle: 0 };
  pipes = [];
  frame = 0;
  score = 0;
  scoreEl.textContent = 0;
  cloudOffset = 0;
  highScore = localStorage.getItem('flappyChickenHS') || 0;
  highscoreEl.textContent = `High Score: ${highScore}`;
  newHighEl.classList.add('hidden');
}

function startGame() {
  audioCtx.resume(); // for mobile
  init();
  gameState = 'playing';
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  gameLoop();
}

function gameOver() {
  gameState = 'over';
  playSound('hit');
  if(score > highScore) {
    highScore = score;
    localStorage.setItem('flappyChickenHS', highScore);
    newHighEl.classList.remove('hidden');
  }
  finalScoreEl.textContent = score;
  highscoreEl.textContent = `High Score: ${highScore}`;
  gameOverScreen.classList.remove('hidden');
}

// Draw background with clouds and grass
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0, '#4facfe'); grad.addColorStop(1, '#00f2fe');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Clouds
  cloudOffset = (cloudOffset + 0.5) % (canvas.width + 100);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for(let i=0; i<3; i++) {
    let x = (i*200 - cloudOffset + canvas.width) % (canvas.width + 100) - 50;
    ctx.beginPath();
    ctx.arc(x, 80+i*10, 30, 0, Math.PI*2);
    ctx.arc(x+40, 80+i*10, 40, 0, Math.PI*2);
    ctx.arc(x+80, 80+i*10, 30, 0, Math.PI*2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(0, canvas.height-60, canvas.width, 60);
  ctx.fillStyle = '#32CD32';
  ctx.fillRect(0, canvas.height-60, canvas.width, 12);
}

// Upgraded chicken with animation
function drawChicken(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Body
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.ellipse(0, 0, 22, 19, 0, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.beginPath(); ctx.arc(18, -5, 13, 0, Math.PI*2); ctx.fill();

  // Wing flap animation
  ctx.fillStyle = '#FFC700';
  ctx.beginPath();
  ctx.ellipse(-3 + Math.sin(frame*0.5)*3, 2, 11, 9, 0.4, 0, Math.PI*2);
  ctx.fill();

  // Comb
  ctx.fillStyle = '#FF0000';
  for(let i=-1; i<=1; i++) {
    ctx.beginPath(); ctx.arc(15+i*5, -18, 4, 0, Math.PI*2); ctx.fill();
  }

  // Beak
  ctx.fillStyle = '#FFA500';
  ctx.beginPath(); ctx.moveTo(30, -5); ctx.lineTo(40, -2); ctx.lineTo(30, 1); ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(22, -7, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(23, -8, 1, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawPipe(pipe) {
  // Pipe body
  ctx.fillStyle = '#2E8B57';
  ctx.fillRect(pipe.x, 0, pipe.w, pipe.top);
  ctx.fillRect(pipe.x, pipe.bottom, pipe.w, canvas.height-pipe.bottom);

  // Pipe lip
  ctx.fillStyle = '#228B22';
  ctx.fillRect(pipe.x-4, pipe.top-25, pipe.w+8, 25);
  ctx.fillRect(pipe.x-4, pipe.bottom, pipe.w+8, 25);
}

function update() {
  if(gameState!== 'playing') return;

  drawBackground();

  // Chicken physics
  chicken.vy += GRAVITY;
  chicken.y += chicken.vy;
  chicken.angle = Math.max(-0.5, Math.min(0.5, chicken.vy * 0.08));

  drawChicken(chicken.x, chicken.y, chicken.angle);

  // Spawn pipes
  if(frame % PIPE_SPACING === 0) {
    const top = Math.random() * (canvas.height - PIPE_GAP - 120) + 60;
    pipes.push({ x: canvas.width, top: top, bottom: top + PIPE_GAP, w: 65, passed: false });
  }

  // Update pipes
  for(let i=pipes.length-1; i>=0; i--) {
    let p = pipes[i];
    p.x -= PIPE_SPEED;
    drawPipe(p);

    // Score
    if(!p.passed && p.x + p.w < chicken.x) {
      score++; scoreEl.textContent = score; p.passed = true; playSound('score');
    }

    // Collision
    if(chicken.x+20 > p.x && chicken.x-20 < p.x+p.w &&
       (chicken.y-18 < p.top || chicken.y+18 > p.bottom)) {
      gameOver();
    }

    if(p.x + p.w < 0) pipes.splice(i,1);
  }

  // Ground/Ceiling collision
  if(chicken.y+18 > canvas.height-60 || chicken.y-18 < 0) gameOver();

  frame++;
  if(gameState === 'playing') requestAnimationFrame(update);
}

function gameLoop() { update(); }

function flap() {
  if(gameState === 'playing') {
    chicken.vy = FLAP;
    playSound('flap');
  }
}

// Controls
document.addEventListener('keydown', e => { if(e.code==='Space') flap(); });
canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });

// Start with start screen
init();
</script>
</body>
</html>
